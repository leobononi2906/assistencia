<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bononi — Assistência Técnica</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #F0F3F8;
  --surface:      #FFFFFF;
  --surface2:     #F7F9FC;
  --border:       #E2E8F2;
  --blue-dark:    #1A3A8F;
  --blue-mid:     #0077CC;
  --blue-light:   #00AAEE;
  --blue-pale:    #E8F4FD;
  --text-primary: #0F1D35;
  --text-secondary:#5A6A85;
  --text-muted:   #9AA5B8;
  --green:        #0F9D6E;
  --green-bg:     #E8F8F3;
  --red:          #D93025;
  --red-bg:       #FEF0EF;
  --orange:       #E07B00;
  --orange-bg:    #FEF5E7;
  --yellow:       #B45309;
  --yellow-bg:    #FFFBEB;
  --purple:       #7C3AED;
  --purple-bg:    #F5F3FF;
  --shadow-sm:    0 1px 3px rgba(15,29,53,0.06), 0 1px 2px rgba(15,29,53,0.04);
  --shadow-md:    0 4px 16px rgba(15,29,53,0.08), 0 2px 4px rgba(15,29,53,0.04);
  --shadow-lg:    0 12px 40px rgba(15,29,53,0.12);
  --radius:       12px;
  --radius-sm:    8px;
  --sidebar-w:    228px;
  --sidebar-bg:   #111827;
}

html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

/* ══ LAYOUT ══ */
.app-shell { display: flex; height: 100vh; overflow: hidden; }

/* ══ SIDEBAR ══ */
.sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--sidebar-bg); display: flex; flex-direction: column; overflow: hidden; z-index: 100; transition: transform 0.25s ease; }
.sidebar-brand { padding: 18px 16px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
.brand-row { display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 34px; height: 34px; background: var(--orange); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.brand-icon svg { width: 18px; height: 18px; }
.brand-name { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
.brand-sub { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 1px; }
.sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; scrollbar-width: none; }
.sidebar-nav::-webkit-scrollbar { display: none; }
.nav-module { margin-bottom: 4px; border-radius: var(--radius-sm); overflow: hidden; }
.nav-module-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; cursor: pointer; border-radius: var(--radius-sm); transition: background 0.15s; user-select: none; }
.nav-module-header:hover { background: rgba(255,255,255,0.05); }
.nav-module-header.has-active { background: rgba(224,123,0,0.12); }
.nav-module-label { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); }
.nav-module-icon { font-size: 13px; }
.nav-module-chevron { font-size: 10px; color: rgba(255,255,255,0.2); transition: transform 0.2s; }
.nav-module.collapsed .nav-module-chevron { transform: rotate(-90deg); }
.nav-module.collapsed .nav-module-items { display: none; }
.nav-module-items { padding: 2px 0 4px 4px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius-sm); color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; margin-bottom: 1px; white-space: nowrap; }
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.88); }
.nav-item.active { background: rgba(224,123,0,0.2); color: #FDBA74; font-weight: 600; }
.nav-item .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; flex-shrink: 0; }
.nav-item.active .nav-dot { opacity: 1; }
.nav-separator { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 6px; }
.sidebar-footer { flex-shrink: 0; padding: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
.user-card { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius-sm); }
.user-avatar { width: 30px; height: 30px; border-radius: 8px; background: var(--orange); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); }
.user-perfil { font-size: 10px; color: rgba(255,255,255,0.35); }
.sidebar-actions { display: flex; gap: 4px; padding: 0 2px; margin-top: 6px; }
.sidebar-action-btn { flex: 1; padding: 7px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-sm); color: rgba(255,255,255,0.45); font-size: 11px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; }
.sidebar-action-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
.sidebar-action-btn.danger:hover { background: rgba(217,48,37,0.15); color: #F87171; border-color: rgba(217,48,37,0.25); }

/* ══ MAIN ══ */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar { height: 54px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; box-shadow: var(--shadow-sm); }
.menu-toggle { display: none; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-secondary); padding: 4px; border-radius: 6px; line-height: 1; }
.topbar-title-area { flex: 1; min-width: 0; }
.page-title { font-size: 15px; font-weight: 700; color: var(--blue-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.page-breadcrumb { font-size: 11px; color: var(--text-muted); }
.topbar-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.filter-select { height: 34px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 0 10px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text-primary); background: var(--surface2); cursor: pointer; outline: none; transition: border-color 0.15s; }
.filter-select:focus { border-color: var(--blue-mid); }
.btn-refresh { height: 34px; padding: 0 12px; background: var(--blue-dark); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; }
.btn-refresh:hover { background: var(--blue-mid); }
.last-update { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.module-loading-bar { position: absolute; top: 54px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--orange), #FCD34D, var(--orange)); background-size: 200% 100%; animation: loadingBar 1.2s linear infinite; display: none; z-index: 50; }
.module-loading-bar.show { display: block; }
@keyframes loadingBar { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.content-area { flex: 1; overflow-y: auto; position: relative; }
.module-slot { display: none; height: 100%; }
.module-slot.active { display: block; }
.module-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; color: var(--text-muted); }
.module-placeholder .spinner { width: 32px; height: 32px; border: 3px solid rgba(26,58,143,0.12); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; }
.module-placeholder p { font-size: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ CSS COMPARTILHADO ══ */
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }
.cards-grid { display: grid; gap: 12px; margin-bottom: 16px; }
.cards-grid-2 { grid-template-columns: repeat(2,1fr); }
.cards-grid-3 { grid-template-columns: repeat(3,1fr); }
.cards-grid-4 { grid-template-columns: repeat(4,1fr); }
.cards-grid-5 { grid-template-columns: repeat(5,1fr); }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow-sm); transition: box-shadow 0.15s; }
.card:hover { box-shadow: var(--shadow-md); }
.card-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.card-value { font-size: 22px; font-weight: 700; color: var(--text-primary); font-family: 'DM Mono', monospace; line-height: 1.2; }
.card-value.green  { color: var(--green); }
.card-value.red    { color: var(--red); }
.card-value.orange { color: var(--orange); }
.card-value.blue   { color: var(--blue-mid); }
.card-value.warning{ color: var(--orange); }
.card-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-bottom: 16px; }
.chart-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.chart-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.chart-body { padding: 16px 18px; }
.table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-bottom: 16px; overflow: hidden; }
.table-card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.table-card-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { padding: 10px 14px; text-align: left; font-size: 10.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--surface2); }
.data-table td { padding: 11px 14px; border-bottom: 1px solid #F0F4FA; vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #F8FAFC; }
.data-table .right { text-align: right; }
.data-table .mono { font-family: 'DM Mono', monospace; }
.data-table .green { color: var(--green); }
.data-table .red   { color: var(--red); }
.data-table .orange{ color: var(--orange); }
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-green   { background: var(--green-bg);  color: #065F46; }
.badge-red     { background: var(--red-bg);    color: #991B1B; }
.badge-orange  { background: var(--orange-bg); color: #92400E; }
.badge-blue    { background: var(--blue-pale); color: var(--blue-dark); }
.badge-gray    { background: var(--surface2);  color: var(--text-muted); }
.badge-purple  { background: var(--purple-bg); color: var(--purple); }
.btn { display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; border: none; white-space: nowrap; text-decoration: none; }
.btn-primary   { background: var(--blue-dark); color: #fff; }
.btn-primary:hover { background: var(--blue-mid); }
.btn-secondary { background: var(--surface2); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger    { background: var(--red-bg); color: var(--red); }
.btn-danger:hover { background: #FECACA; }
.btn-success   { background: var(--green-bg); color: var(--green); }
.btn-success:hover { background: #BBF7D0; }
.btn-outline   { background: none; color: var(--blue-mid); border: 1.5px solid var(--blue-mid); }
.btn-outline:hover { background: var(--blue-pale); }
.btn-sm        { height: 28px; padding: 0 10px; font-size: 12px; }
.btn-icon      { width: 30px; height: 30px; padding: 0; display: inline-flex; align-items: center; justify-content: center; background: none; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--text-muted); font-size: 13px; transition: all 0.15s; }
.btn-icon:hover { background: var(--surface2); color: var(--text-primary); }
.search-input { height: 32px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 0 10px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text-primary); background: var(--surface2); outline: none; transition: border-color 0.15s; }
.search-input:focus { border-color: var(--blue-mid); }
.page-content { display: none; padding: 20px 24px; }
.page-content.active { display: block; }
.loading-row td { text-align: center; padding: 32px; color: var(--text-muted); }
.fluxo-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.fluxo-btn { padding: 5px 12px; font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; color: var(--text-muted); background: none; border: none; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.fluxo-btn.active { background: var(--blue-dark); color: #fff; }
.fluxo-btn:hover:not(.active) { background: var(--border); }
.drawer { position: fixed; top: 0; right: -600px; width: 580px; max-width: 95vw; height: 100vh; background: var(--surface); box-shadow: var(--shadow-lg); z-index: 300; transition: right 0.28s ease; display: flex; flex-direction: column; }
.drawer.open { right: 0; }
.drawer-overlay { position: fixed; inset: 0; background: rgba(15,29,53,0.35); z-index: 299; display: none; }
.drawer-overlay.open { display: block; }
.drawer-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
.drawer-body { flex: 1; overflow-y: auto; }
.drawer-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; background: var(--surface2); flex-shrink: 0; overflow-x: auto; }
.drawer-tab { padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.drawer-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.drawer-tab-content { display: none; padding: 16px 20px; }
.drawer-tab-content.active { display: block; }
.modal-overlay { position: fixed; inset: 0; background: rgba(15,29,53,0.45); z-index: 400; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-body { padding: 20px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
.field input, .field select, .field textarea { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text-primary); background: var(--surface2); outline: none; transition: all 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--blue-mid); box-shadow: 0 0 0 3px rgba(0,119,204,0.08); }
.alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 12px; }
.alert-success { background: #F0FDF4; border: 1px solid #BBF7D0; color: #166534; }
.alert-error   { background: var(--red-bg); border: 1px solid #FECACA; color: #991B1B; }
.alert-warning { background: var(--orange-bg); border: 1px solid #FCD34D; color: #92400E; }
.alert-info    { background: var(--blue-pale); border: 1px solid #BAE6FD; color: var(--blue-dark); }

/* ══ AUTH LOADING ══ */
.auth-loading { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.auth-loading .spinner { width: 36px; height: 36px; border: 3px solid rgba(224,123,0,0.12); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
.auth-loading p { font-size: 14px; color: var(--text-muted); }

/* ══ LOGIN ══ */
.login-wrap { position: fixed; inset: 0; background: var(--bg); z-index: 998; display: none; align-items: center; justify-content: center; padding: 20px; }
.login-wrap.show { display: flex; }
.login-card { background: #fff; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-md); padding: 40px 36px; width: 100%; max-width: 380px; }
.login-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.login-brand-icon { width: 38px; height: 38px; background: var(--orange); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.login-brand-icon svg { width: 20px; height: 20px; }
.login-brand-name { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.login-brand-sub { font-size: 11px; color: var(--text-muted); }
.login-h1 { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
.login-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.login-input { width: 100%; height: 42px; border: 1.5px solid var(--border); border-radius: 8px; padding: 0 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text-primary); background: var(--surface2); outline: none; transition: border-color 0.15s, box-shadow 0.15s; margin-bottom: 14px; }
.login-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(224,123,0,0.1); background: #fff; }
.login-btn { width: 100%; height: 44px; background: var(--orange); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; margin-top: 4px; }
.login-btn:hover { background: #C96E00; }
.login-btn:disabled { background: var(--text-muted); cursor: not-allowed; }
.login-erro { background: var(--red-bg); border: 1px solid #FECACA; color: #991B1B; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
.login-spinner { display: none; align-items: center; justify-content: center; gap: 8px; font-size: 13px; color: var(--text-secondary); padding: 10px 0; }

/* ══ RESPONSIVE ══ */
@media (max-width: 900px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 200; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 199; }
  .sidebar-overlay.open { display: block; }
  .menu-toggle { display: block; }
  .cards-grid-4 { grid-template-columns: repeat(2,1fr); }
  .cards-grid-5 { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 600px) {
  .cards-grid-3 { grid-template-columns: 1fr 1fr; }
  .page-content { padding: 14px; }
  .topbar { padding: 0 12px; }
}
</style>
</head>
<body>

<div class="auth-loading" id="auth-loading">
  <div class="spinner"></div>
  <p>Verificando acesso...</p>
</div>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">
        <svg viewBox="0 0 20 20" fill="none"><rect x="1" y="6" width="8" height="10" rx="2" fill="white" opacity="0.9"/><rect x="11" y="1" width="8" height="10" rx="2" fill="white" opacity="0.6"/><rect x="11" y="13" width="8" height="6" rx="2" fill="white" opacity="0.8"/></svg>
      </div>
      <div>
        <div class="login-brand-name">Assistência Técnica</div>
        <div class="login-brand-sub">Bononi · Stonni</div>
      </div>
    </div>
    <div class="login-h1">Entrar</div>
    <div class="login-sub">Acesse o sistema de assistência</div>
    <div class="login-erro" id="login-erro"></div>
    <label class="login-label">E-mail</label>
    <input class="login-input" type="email" id="login-email" placeholder="seu@email.com.br" autocomplete="email" />
    <label class="login-label">Senha</label>
    <input class="login-input" type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') fazerLogin()" />
    <button class="login-btn" id="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-spinner" id="login-spinner">
      <div class="spinner" style="width:18px;height:18px;border-width:2px;border-top-color:var(--orange)"></div> Verificando...
    </div>
  </div>
</div>

<div class="app-shell" id="app-shell" style="display:none">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-row">
        <div class="brand-icon">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
'use strict';

const SUPA_URL = 'https://vishxwdxqiygbxmtpfoy.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc2h4d2R4cWl5Z2J4bXRwZm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Njg2MjIsImV4cCI6MjA4ODA0NDYyMn0.J647m3ieDHahNQYBWMRESl0aPFXsT_zt_7ZcDvyB-SA';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let usuarioAtual    = null;
let paginaAtiva     = null;
let moduloCarregado = false;

// Globais para assistencia.js
window.sb          = sb;
window.getUsuario  = () => usuarioAtual;
window.getEmpresa  = () => '';
window.getSelectedMonth = () => '';
window.getMonthRange = (ym) => {
  const now = new Date();
  const [y,m] = (ym||`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`).split('-').map(Number);
  const start = new Date(Date.UTC(y,m-1,1)), end = new Date(Date.UTC(y,m,0,23,59,59,999));
  const pad = n => String(n).padStart(2,'0');
  return { startISO:start.toISOString(), endISO:end.toISOString(), startDate:`${y}-${pad(m)}-01`, endDate:`${y}-${pad(m)}-${new Date(y,m,0).getDate()}` };
};
window.getNomeEmpresa = (id) => ({1:'TRUCKPREST',2:'MLB PR',3:'MLB SC',4:'MLB SP',5:'SANTA TEREZA',6:'BATTOGO',7:'BONONI PR',8:'BONONI SC',9:'OP. LOGÍSTICO'})[parseInt(id)]||`Empresa ${id}`;
window.fmt = (v,dec=0) => { const n=parseFloat(v)||0,abs=Math.abs(n); let s; if(abs>=1e6)s=(n/1e6).toFixed(1).replace('.',',')+' M'; else if(abs>=1e3)s=(n/1e3).toFixed(1).replace('.',',')+' K'; else s=n.toFixed(dec).replace('.',','); return 'R$ '+s; };
window.fmtFull = (v) => 'R$ '+(parseFloat(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
window.fmtDate = (d) => { if(!d) return '—'; return new Date(d).toLocaleDateString('pt-BR'); };
window.setLastUpdate = () => { document.getElementById('last-update').textContent = `Atualizado ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`; };

const PAGINAS = {
  'ast-gestao':   { label: 'Gestão',          breadcrumb: 'Assistência · Gestão' },
  'ast-chamados': { label: 'Chamados',         breadcrumb: 'Assistência · Chamados' },
  'ast-produtos': { label: 'Produtos',         breadcrumb: 'Assistência · Produtos' },
  'ast-config':   { label: 'Configurações',    breadcrumb: 'Assistência · Config' },
};

async function navegarPara(paginaId) {
  const pg = PAGINAS[paginaId]; if (!pg) return;
  document.getElementById('page-title').textContent      = pg.label;
  document.getElementById('page-breadcrumb').textContent = pg.breadcrumb;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item[data-pagina="${paginaId}"]`)?.classList.add('active');
  document.getElementById(`nav-module-ast`)?.classList.remove('collapsed');
  paginaAtiva = paginaId;

  const slot = document.getElementById('slot-ast');
  if (!moduloCarregado) {
    document.getElementById('module-loading-bar').classList.add('show');
    slot.innerHTML = `<div class="module-placeholder"><div class="spinner"></div><p>Carregando Assistência...</p></div>`;
    await new Promise(resolve => {
      const s = document.createElement('script');
      s.src = 'assistencia.js?v=' + Date.now();
      s.onload  = resolve;
      s.onerror = () => { console.error('Erro ao carregar assistencia.js'); resolve(); };
      document.head.appendChild(s);
    });
    moduloCarregado = true;
    document.getElementById('module-loading-bar').classList.remove('show');
  }

  const mod = window.ModuloAssistencia;
  if (mod?.showPage) mod.showPage(paginaId, slot, usuarioAtual, { empresa: '', mes: '' });
}

function onRefresh() {
  if (paginaAtiva) navegarPara(paginaAtiva);
  window.setLastUpdate();
}

function toggleNavModule(id) {
  document.getElementById(`nav-module-${id}`)?.classList.toggle('collapsed');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

async function sair() {
  await sb.auth.signOut();
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('login-wrap').classList.add('show');
}

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha  = document.getElementById('login-senha').value;
  const erro   = document.getElementById('login-erro');
  const btn    = document.getElementById('login-btn');
  const spin   = document.getElementById('login-spinner');
  erro.style.display = 'none';
  if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha.'; erro.style.display = 'block'; return; }
  btn.style.display  = 'none';
  spin.style.display = 'flex';
  const { error } = await sb.auth.signInWithPassword({ email, password: senha });
  if (error) {
    btn.style.display  = 'block'; spin.style.display = 'none';
    erro.textContent = error.message.includes('Invalid') ? 'E-mail ou senha incorretos.' : error.message;
    erro.style.display = 'block'; return;
  }
  await iniciarApp();
}

async function iniciarApp() {
  const { data: { session } } = await sb.auth.getSession();
  document.getElementById('auth-loading').style.display = 'none';
  if (!session) {
    document.getElementById('login-wrap').classList.add('show');
    return;
  }
  const meta = session.user.user_metadata || {};
  const temAcesso = meta.admin === true || (meta.modulos || []).includes('assistencia');
  if (!temAcesso) {
    document.getElementById('login-wrap').classList.add('show');
    document.getElementById('login-erro').textContent = 'Você não tem acesso ao módulo de Assistência Técnica.';
    document.getElementById('login-erro').style.display = 'block';
    await sb.auth.signOut();
    return;
  }
  usuarioAtual = {
    id:    session.user.id,
    email: session.user.email,
    nome:  meta.nome || session.user.email.split('@')[0],
    admin: meta.admin === true,
  };
  document.getElementById('user-avatar').textContent = usuarioAtual.nome.charAt(0).toUpperCase();
  document.getElementById('user-name').textContent   = usuarioAtual.nome;
  document.getElementById('login-wrap').classList.remove('show');
  document.getElementById('app-shell').style.display = 'flex';
  await navegarPara('ast-gestao');
}

iniciarApp();
</script>
